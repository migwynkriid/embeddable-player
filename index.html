<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Live Stream Player</title>
    <!-- Video.js - same library used by kcnawatch.org -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        .video-js {
            width: 100%;
            height: 100%;
        }
        
        /* Hide big play button - we autoplay */
        .video-js .vjs-big-play-button {
            display: none;
        }
    </style>
</head>
<body>
    <video 
        id="player" 
        class="video-js vjs-big-play-centered vjs-fluid"
        autoplay 
        playsinline
        preload="auto">
        <source src="/stream/tvhls/stream.m3u8" type="application/x-mpegURL">
        <p class="vjs-no-js">Please enable JavaScript to watch this stream.</p>
    </video>
    
    <script>
        // Check if ?controls is in the URL
        const urlParams = new URLSearchParams(window.location.search);
        const showControls = urlParams.has('controls');
        
        document.addEventListener('DOMContentLoaded', function() {
            const player = videojs('player', {
                fluid: true,
                autoplay: 'muted',  // Start muted for browser compatibility
                muted: true,
                controls: showControls,  // Only show controls if ?controls in URL
                preload: 'auto',
                html5: {
                    vhs: {
                        overrideNative: true
                    },
                    nativeAudioTracks: false,
                    nativeVideoTracks: false
                }
            });
            
            player.ready(function() {
                // Try to unmute after playback starts (works on kiosk Chrome with special flags)
                player.on('playing', function() {
                    console.log('Stream playing');
                    // Attempt to unmute - will work on kiosk Chrome, silently fail on strict browsers
                    try {
                        player.muted(false);
                    } catch(e) {
                        console.log('Could not unmute:', e);
                    }
                });
            });
            
            player.on('error', function(e) {
                console.log('Player error:', player.error());
                // Retry on error
                setTimeout(function() {
                    player.src({ src: '/stream/tvhls/stream.m3u8', type: 'application/x-mpegURL' });
                    player.play();
                }, 3000);
            });
        });
    </script>
</body>
</html>

</body>
</html>
