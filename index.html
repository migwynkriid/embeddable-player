<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Live Stream Player</title>
    <!-- Video.js - same library used by kcnawatch.org -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        .video-js {
            width: 100%;
            height: 100%;
        }
        
        /* Hide big play button - we autoplay */
        .video-js .vjs-big-play-button {
            display: none;
        }
    </style>
</head>
<body>
    <video 
        id="player" 
        class="video-js vjs-big-play-centered vjs-fluid"
        autoplay 
        playsinline
        preload="auto">
        <source src="/stream/tvhls/stream.m3u8" type="application/x-mpegURL">
        <p class="vjs-no-js">Please enable JavaScript to watch this stream.</p>
    </video>
    
    <script>
        // Check if ?controls is in the URL
        const urlParams = new URLSearchParams(window.location.search);
        const showControls = urlParams.has('controls');
        
        document.addEventListener('DOMContentLoaded', function() {
            let retryCount = 0;
            const maxRetries = 10;
            const baseRetryDelay = 2000; // 2 seconds
            let stallCheckInterval;
            let lastPlayPosition = 0;
            let stallCount = 0;
            
            const player = videojs('player', {
                fluid: true,
                autoplay: 'muted',
                muted: true,
                controls: showControls,
                preload: 'auto',
                liveui: true,
                html5: {
                    vhs: {
                        overrideNative: true,
                        // Retry settings for segment fetching
                        bandwidth: 5000000,
                        enableLowInitialPlaylist: false,
                        smoothQualityChange: true,
                        allowSeeksWithinUnsafeLiveWindow: true,
                        // Faster recovery
                        maxPlaylistRetries: 10,
                        handleManifestRedirects: true
                    },
                    nativeAudioTracks: false,
                    nativeVideoTracks: false
                }
            });
            
            // Reload stream function with exponential backoff
            function reloadStream() {
                if (retryCount >= maxRetries) {
                    console.log('Max retries reached, waiting 30s before resetting...');
                    retryCount = 0;
                    setTimeout(reloadStream, 30000);
                    return;
                }
                
                const delay = Math.min(baseRetryDelay * Math.pow(1.5, retryCount), 15000);
                retryCount++;
                console.log(`Retry #${retryCount} in ${delay}ms...`);
                
                setTimeout(function() {
                    player.src({ src: '/stream/tvhls/stream.m3u8', type: 'application/x-mpegURL' });
                    player.load();
                    player.play().catch(function() {
                        player.muted(true);
                        player.play();
                    });
                }, delay);
            }
            
            // Reset retry count on successful playback
            player.on('playing', function() {
                console.log('Stream playing');
                retryCount = 0;
                stallCount = 0;
                
                // Try to unmute (works on kiosk Chrome with special flags)
                try {
                    player.muted(false);
                } catch(e) {}
            });
            
            // Handle errors
            player.on('error', function(e) {
                console.log('Player error:', player.error());
                reloadStream();
            });
            
            // Stall detection - if video freezes for too long
            stallCheckInterval = setInterval(function() {
                if (!player.paused() && player.readyState() >= 2) {
                    const currentTime = player.currentTime();
                    if (currentTime === lastPlayPosition && currentTime > 0) {
                        stallCount++;
                        console.log('Stall detected, count:', stallCount);
                        if (stallCount >= 5) { // ~5 seconds of stall
                            console.log('Stream stalled, reloading...');
                            stallCount = 0;
                            reloadStream();
                        }
                    } else {
                        stallCount = 0;
                    }
                    lastPlayPosition = currentTime;
                }
            }, 1000);
            
            // Handle waiting/buffering
            player.on('waiting', function() {
                console.log('Buffering...');
            });
            
            // Network offline/online detection
            window.addEventListener('online', function() {
                console.log('Network restored, reloading stream...');
                retryCount = 0;
                reloadStream();
            });
            
            window.addEventListener('offline', function() {
                console.log('Network lost');
            });
            
            // Handle page visibility - pause when hidden, resume when visible
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    // Page hidden - optionally pause to save bandwidth
                    // player.pause();
                } else {
                    // Page visible - ensure playing
                    if (player.paused()) {
                        player.play().catch(function() {});
                    }
                }
            });
            
            // Cleanup on page unload
            window.addEventListener('beforeunload', function() {
                clearInterval(stallCheckInterval);
                player.dispose();
            });
        });
    </script>
</body>
</html>
