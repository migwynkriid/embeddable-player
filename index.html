<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Live Stream Player</title>
    <!-- Video.js - same library used by kcnawatch.org -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        .video-js {
            width: 100%;
            height: 100%;
        }
        
        /* Hide controls for clean autoplay */
        .video-js .vjs-control-bar {
            display: flex;
        }
    </style>
</head>
<body>
    <video 
        id="player" 
        class="video-js vjs-big-play-centered vjs-fluid"
        autoplay 
        muted 
        playsinline
        preload="auto"
        data-setup='{"fluid": true, "autoplay": true, "muted": true}'>
        <source src="/stream/tvhls/stream.m3u8" type="application/x-mpegURL">
        <p class="vjs-no-js">Please enable JavaScript to watch this stream.</p>
    </video>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const player = videojs('player', {
                fluid: true,
                autoplay: true,
                muted: true,
                preload: 'auto',
                html5: {
                    vhs: {
                        overrideNative: true
                    },
                    nativeAudioTracks: false,
                    nativeVideoTracks: false
                }
            });
            
            player.on('playing', function() {
                console.log('Stream playing');
                // Try fullscreen after playback starts
                requestFullscreen();
            });
            
            player.on('error', function(e) {
                console.log('Player error:', player.error());
                // Retry on error
                setTimeout(function() {
                    player.src({ src: '/stream/tvhls/stream.m3u8', type: 'application/x-mpegURL' });
                    player.play();
                }, 3000);
            });
        });
        
        function requestFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(() => {});
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }
    </script>

</html>
